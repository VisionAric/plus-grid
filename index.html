<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive ASCII Grid</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  cursor: none;
}

canvas {
  position: fixed;
  top: 0; left: 0;
  display: block;
}

.cur-dot {
  position: fixed;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #fff;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 9999;
}

.cur-ring {
  position: fixed;
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.22);
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 9999;
  transition: width 0.22s ease, height 0.22s ease, border-color 0.25s ease;
}

.cur-ring.pressed {
  width: 52px; height: 52px;
  border-color: rgba(255,255,255,0.45);
}
</style>
</head>
<body>

<canvas id="mc"></canvas>
<div class="cur-dot"  id="cdot"></div>
<div class="cur-ring" id="cring"></div>

<script>
const mc    = document.getElementById('mc');
const mCtx  = mc.getContext('2d');
const cdot  = document.getElementById('cdot');
const cring = document.getElementById('cring');

/* ── ASCII character pool ───────────────────────────────────── */
const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%&*?/\\|<>[]{}~^=+-_'.split('');
const randChar = () => CHARS[Math.random() * CHARS.length | 0];

/* ── config ─────────────────────────────────────────────────── */
const CFG = {
  spacing : 12,     // grid spacing in px  (12 = 4× more particles than 24)
  fontSize: 8,      // base font size — fits snugly at 12 px spacing
  radius  : 100,    // base cursor influence radius
  baseOp  : 0.07,   // resting opacity
  sp      : 0.09,   // lerp speed
};

/* ── state ──────────────────────────────────────────────────── */
let W, H;
let mx = -2000, my = -2000;
let tmx = -2000, tmy = -2000;
let prevMx = -2000, prevMy = -2000;
let vx = 0, vy = 0;
let particles = [];
let ripples = [];
let frame = 0;

/* ── helpers ────────────────────────────────────────────────── */
const lerp  = (a, b, t) => a + (b - a) * t;
const ss    = t => t * t * (3 - 2 * t);
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

/* ── grid ───────────────────────────────────────────────────── */
function setupGrid() {
  particles = [];
  const cols = Math.ceil(W / CFG.spacing) + 2;
  const rows = Math.ceil(H / CFG.spacing) + 2;
  const ox = ((W % CFG.spacing) / 2) | 0;
  const oy = ((H % CFG.spacing) / 2) | 0;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      particles.push({
        x   : ox + c * CFG.spacing,
        y   : oy + r * CFG.spacing,
        char: randChar(),
        // animation state
        op      : CFG.baseOp,
        // char cycling
        timer   : (Math.random() * 120) | 0,   // frames until next char swap
      });
    }
  }
}

function resize() {
  W = mc.width  = window.innerWidth;
  H = mc.height = window.innerHeight;
  setupGrid();
}

/* ── main loop ──────────────────────────────────────────────── */
function tick() {
  frame++;

  /* smooth cursor */
  mx = lerp(mx, tmx, 0.35);
  my = lerp(my, tmy, 0.35);

  /* smooth velocity */
  const rawVx = mx - prevMx;
  const rawVy = my - prevMy;
  prevMx = mx;
  prevMy = my;
  const isSlowing = Math.hypot(rawVx, rawVy) < Math.hypot(vx, vy);
  vx = lerp(vx, rawVx, isSlowing ? 0.18 : 0.42);
  vy = lerp(vy, rawVy, isSlowing ? 0.18 : 0.42);

  /* velocity direction + magnitude */
  const vSpeed = Math.hypot(vx, vy);
  const velMag = Math.pow(clamp(vSpeed / 4, 0, 1), 0.6);
  const svx = vSpeed > 0.05 ? vx / vSpeed : 0;
  const svy = vSpeed > 0.05 ? vy / vSpeed : 0;

  /* directional teardrop radii */
  const R      = CFG.radius;
  const Rtrail = lerp(R, R * 3.2,  velMag);
  const Rfront = lerp(R, R * 0.15, velMag);
  const Rside  = lerp(R, R * 1.4,  velMag);

  mCtx.clearRect(0, 0, W, H);

  /* advance ripples */
  for (const rp of ripples) {
    rp.r  += rp.speed;
    rp.op  = Math.max(0, 1 - rp.r / rp.maxR);
  }
  for (let i = ripples.length - 1; i >= 0; i--) {
    if (ripples[i].op <= 0) ripples.splice(i, 1);
  }

  /* set font once for the whole frame — fixed size for performance */
  mCtx.font         = `${CFG.fontSize}px "Courier New", monospace`;
  mCtx.textAlign    = 'center';
  mCtx.textBaseline = 'middle';

  const { sp, baseOp } = CFG;

  for (const p of particles) {
    const dx = p.x - mx;
    const dy = p.y - my;

    const proj   = dx * svx + dy * svy;
    const perp   = Math.sqrt(Math.max(0, dx * dx + dy * dy - proj * proj));
    const Ra     = proj < 0 ? Rtrail : Rfront;
    const ellVal = (proj / Ra) * (proj / Ra) + (perp / Rside) * (perp / Rside);

    let tOp, intensity;

    if (ellVal < 1) {
      const t      = 1 - Math.sqrt(ellVal);
      const st     = ss(t);
      const isTrail   = proj <= 0;
      const dirFactor = isTrail ? 1.0 : lerp(1.0, 0.06, velMag);
      intensity = st * dirFactor;                 // active even when cursor is still
      const opI = Math.sqrt(intensity);           // sqrt → reaches 1.0 faster
      tOp = baseOp + opI * (1 - baseOp);         // full white at centre of trail
    } else {
      intensity = 0;
      tOp = baseOp;
    }

    /* ripple edge boost */
    let rBoost = 0;
    for (const rp of ripples) {
      const rdx = p.x - rp.x;
      const rdy = p.y - rp.y;
      const rd  = Math.sqrt(rdx * rdx + rdy * rdy);
      const edgeDist = Math.abs(rd - rp.r);
      if (edgeDist < 35) {
        const bt = ss(1 - edgeDist / 35) * rp.op;
        if (bt > rBoost) rBoost = bt;
      }
    }

    /* lerp opacity */
    p.op = lerp(p.op, tOp, sp);

    /* final opacity with ripple boost */
    const dOp = clamp(p.op + rBoost * 0.88, 0, 1);

    /* character cycling:
       - lit particles: flicker every 2-10 frames
       - resting: swap every 80-200 frames                    */
    p.timer--;
    if (p.timer <= 0) {
      p.char  = randChar();
      const effectiveIntensity = Math.max(intensity, rBoost);
      p.timer = effectiveIntensity > 0.05
        ? Math.max(2, ((1 - effectiveIntensity) * 12) | 0)
        : (80 + Math.random() * 120) | 0;
    }

    mCtx.fillStyle = `rgba(255,255,255,${dOp.toFixed(3)})`;
    mCtx.fillText(p.char, p.x, p.y);
  }

  requestAnimationFrame(tick);
}

/* ── events ─────────────────────────────────────────────────── */
function onMove(x, y) {
  tmx = x; tmy = y;
  cdot.style.left  = x + 'px';
  cdot.style.top   = y + 'px';
  cring.style.left = x + 'px';
  cring.style.top  = y + 'px';
}

function spawnRipple(x, y) {
  ripples.push({ x, y, r: 0, maxR: Math.hypot(W, H) * 0.75, speed: 9, op: 1 });
}

document.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
document.addEventListener('touchmove', e => {
  e.preventDefault();
  onMove(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

document.addEventListener('mousedown', e => {
  cring.classList.add('pressed');
  spawnRipple(e.clientX, e.clientY);
});
document.addEventListener('mouseup',   () => cring.classList.remove('pressed'));
document.addEventListener('touchstart', e => spawnRipple(e.touches[0].clientX, e.touches[0].clientY));

window.addEventListener('resize', resize);

resize();
requestAnimationFrame(tick);
</script>
</body>
</html>
